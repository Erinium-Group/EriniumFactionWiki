name: Discord Notification
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Push Notification
        if: github.event_name == 'push'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          nodetail: true
          title: "Push on `${{ github.ref_name }}`"
          description: |
            **${{ github.event.head_commit.message }}**

            `${{ github.event.head_commit.id }}` by **${{ github.actor }}**
            [View commit](${{ github.event.head_commit.url }})
          color: 0x9B5FD0
          username: "EriniumWiki"

      - name: PR Notification
        if: github.event_name == 'pull_request'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          nodetail: true
          title: "PR ${{ github.event.action }}: #${{ github.event.pull_request.number }}"
          description: |
            **${{ github.event.pull_request.title }}**

            by **${{ github.actor }}** — ${{ github.event.pull_request.html_url }}
          color: 0x00E5FF
          username: "EriniumWiki"
